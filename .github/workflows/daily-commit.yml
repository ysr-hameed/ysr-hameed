name: Daily Commit

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          date > LAST_UPDATED
          echo "Last updated: $(date -u)" >> LAST_UPDATED
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily update $(date -u +%Y-%m-%d)"
          branch: main
